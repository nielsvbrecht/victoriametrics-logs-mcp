name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_STORAGE_BACKEND: "file"
  GEMINI_CONFIG_DIR: ${{ github.workspace }}/.gemini_config
  GEMINI_NO_HISTORY: "true"

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    environment: gemini
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: tar.gz
          - os: macos-latest
            platform: darwin
            ext: tar.gz
          - os: windows-latest
            platform: win32
            ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

      - name: Validate Changelog
        shell: bash
        run: |
          VERSION=$(cat version.txt)
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "Error: Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

      - name: Build extension
        run: npm run build

      - name: Test installation (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEBUG: "true"
        run: |
          set -e
          if [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libsecret-1-0
          fi
          # Pin to a known stable version
          npm install -g @google/gemini-cli@0.35.2
          mkdir -p "$GEMINI_CONFIG_DIR"
          # Initialize registry with a more complete structure
          echo '{"projects":{},"version":1,"activeProjectId":null}' > "$GEMINI_CONFIG_DIR/projects.json"
          echo '{"config":{},"version":1}' > "$GEMINI_CONFIG_DIR/config.json"
          
          echo "Checking config files:"
          cat "$GEMINI_CONFIG_DIR/projects.json"
          cat "$GEMINI_CONFIG_DIR/config.json"
          
          # Run from a neutral directory to avoid project detection crashes
          mkdir -p ../test-dir
          cd ../test-dir
          gemini --version --headless || true
          gemini extensions link "$GITHUB_WORKSPACE" --consent --headless || true
          # Capture list output even if it crashes at the end
          gemini extensions list --headless > extensions.txt || true
          cat extensions.txt
          grep "victoriametrics-logs-mcp" extensions.txt

      - name: Test installation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEBUG: "true"
        run: |
          npm install -g @google/gemini-cli@0.35.2
          if (!(Test-Path $env:GEMINI_CONFIG_DIR)) { New-Item -ItemType Directory -Path $env:GEMINI_CONFIG_DIR }
          '{"projects":{},"version":1,"activeProjectId":null}' | Out-File -FilePath (Join-Path $env:GEMINI_CONFIG_DIR "projects.json") -Encoding utf8
          '{"config":{},"version":1}' | Out-File -FilePath (Join-Path $env:GEMINI_CONFIG_DIR "config.json") -Encoding utf8
          
          # Run from a neutral directory
          New-Item -ItemType Directory -Path ../test-dir -Force
          Set-Location ../test-dir
          try { gemini --version --headless } catch {}
          try { gemini extensions link "$env:GITHUB_WORKSPACE" --consent --headless } catch {}
          $exts = ""
          try { $exts = gemini extensions list --headless } catch {}
          echo $exts
          if ($exts -match "victoriametrics-logs-mcp") {
            echo "Extension found"
          } else {
            echo "Extension not found"
            exit 1
          }

      - name: Package extension (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czvf ${{ matrix.platform }}.victoriametrics-logs-mcp.tar.gz \
            gemini-extension.json \
            package.json \
            README.md \
            GEMINI.md \
            dist/ \
            commands/ \
            skills/

      - name: Package extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path gemini-extension.json, package.json, README.md, GEMINI.md, dist, commands, skills -DestinationPath win32.victoriametrics-logs-mcp.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: |
            *.tar.gz
            *.zip

  create-release:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: get_version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
