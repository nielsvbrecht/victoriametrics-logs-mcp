name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Package extension (darwin)
        run: |
          tar -czvf ${{ github.ref_name }}.darwin.victoriametrics-logs-mcp.tar.gz \
            gemini-extension.json \
            package.json \
            README.md \
            GEMINI.md \
            dist/ \
            commands/ \
            skills/

      - name: Package extension (linux)
        run: |
          tar -czvf ${{ github.ref_name }}.linux.victoriametrics-logs-mcp.tar.gz \
            gemini-extension.json \
            package.json \
            README.md \
            GEMINI.md \
            dist/ \
            commands/ \
            skills/

      - name: Package extension (win32)
        run: |
          zip -r ${{ github.ref_name }}.win32.victoriametrics-logs-mcp.zip \
            gemini-extension.json \
            package.json \
            README.md \
            GEMINI.md \
            dist/ \
            commands/ \
            skills/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.ref_name }}.darwin.victoriametrics-logs-mcp.tar.gz
            ${{ github.ref_name }}.linux.victoriametrics-logs-mcp.tar.gz
            ${{ github.ref_name }}.win32.victoriametrics-logs-mcp.zip
          generate_release_notes: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.sha) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
