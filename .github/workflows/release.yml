name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_STORAGE_BACKEND: "file"
  GEMINI_CLI_HOME: ${{ github.workspace }}/temp_home
  GEMINI_NO_HISTORY: "true"

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    environment: gemini
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: tar.gz
          - os: macos-latest
            platform: darwin
            ext: tar.gz
          - os: windows-latest
            platform: win32
            ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        id: unit_tests
        continue-on-error: true
        run: npm test

      - name: Validate Changelog
        shell: bash
        run: |
          VERSION=$(cat version.txt)
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "Error: Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

      - name: Build extension
        run: npm run build

      - name: Package extension (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czvf ${{ matrix.platform }}.victoriametrics-logs-mcp.tar.gz \
            gemini-extension.json \
            package.json \
            README.md \
            GEMINI.md \
            dist/ \
            commands/ \
            skills/

      - name: Package extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path gemini-extension.json, package.json, README.md, GEMINI.md, dist, commands, skills -DestinationPath win32.victoriametrics-logs-mcp.zip

      - name: Test installation (Unix)
        if: runner.os != 'Windows'
        id: install_unix
        continue-on-error: true
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEBUG: "true"
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libsecret-1-0
          fi
          
          # Initialize CLI home structure
          mkdir -p "$GEMINI_CLI_HOME/.gemini"
          echo '{"projects":{},"version":1,"activeProjectId":null}' > "$GEMINI_CLI_HOME/.gemini/projects.json"
          echo '{"config":{},"version":1}' > "$GEMINI_CLI_HOME/.gemini/config.json"
          
          # Install CLI locally in a temp directory
          mkdir -p ../cli-dir
          cd ../cli-dir
          npm install @google/gemini-cli@0.35.2
          
          echo "Testing local extension linking"
          ./node_modules/.bin/gemini -v
          ./node_modules/.bin/gemini extensions link "$GITHUB_WORKSPACE" --consent || true
          
          echo "Verifying extension registry file directly"
          REGISTRY="$GEMINI_CLI_HOME/.gemini/projects.json"
          if [ -f "$REGISTRY" ]; then
            cat "$REGISTRY"
            if grep -q "victoriametrics-logs-mcp" "$REGISTRY"; then
              echo "Extension successfully registered in projects.json"
            else
              echo "Error: Extension not found in projects.json"
              exit 1
            fi
          else
            echo "Error: Registry file not found at $REGISTRY"
            exit 1
          fi

      - name: Test installation (Windows)
        if: runner.os == 'Windows'
        id: install_win
        continue-on-error: true
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEBUG: "true"
        run: |
          $geminiDir = Join-Path $env:GEMINI_CLI_HOME ".gemini"
          if (!(Test-Path $geminiDir)) { New-Item -ItemType Directory -Path $geminiDir }
          '{"projects":{},"version":1,"activeProjectId":null}' | Out-File -FilePath (Join-Path $geminiDir "projects.json") -Encoding utf8
          '{"config":{},"version":1}' | Out-File -FilePath (Join-Path $geminiDir "config.json") -Encoding utf8
          
          # Install CLI locally
          New-Item -ItemType Directory -Path ../cli-dir -Force
          Set-Location ../cli-dir
          npm install @google/gemini-cli@0.35.2
          
          echo "Testing local extension linking"
          $BIN = ".\node_modules\.bin\gemini"
          try { & $BIN -v } catch {}
          try { & $BIN extensions link "$env:GITHUB_WORKSPACE" --consent } catch {}
          
          echo "Verifying extension registry file directly"
          $registryPath = Join-Path $geminiDir "projects.json"
          if (Test-Path $registryPath) {
            $content = Get-Content $registryPath -Raw
            echo $content
            if ($content -match "victoriametrics-logs-mcp") {
              echo "Extension successfully registered in projects.json"
            } else {
              echo "Error: Extension not found in projects.json"
              exit 1
            }
          } else {
            echo "Error: Registry file not found at $registryPath"
            exit 1
          }

      - name: Check Overall Status
        shell: bash
        run: |
          # If any test failed, we want to fail the job at the end
          UNIT_FAILED="${{ steps.unit_tests.outcome == 'failure' }}"
          INSTALL_UNIX_FAILED="${{ steps.install_unix.outcome == 'failure' }}"
          INSTALL_WIN_FAILED="${{ steps.install_win.outcome == 'failure' }}"
          
          if [ "$UNIT_FAILED" == "true" ] || [ "$INSTALL_UNIX_FAILED" == "true" ] || [ "$INSTALL_WIN_FAILED" == "true" ]; then
            echo "One or more tests failed."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: |
            *.tar.gz
            *.zip

  create-release:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: get_version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
