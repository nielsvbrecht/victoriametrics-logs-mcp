name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    environment: gemini
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: tar.gz
          - os: macos-latest
            platform: darwin
            ext: tar.gz
          - os: windows-latest
            platform: win32
            ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate Changelog
        shell: bash
        run: |
          VERSION=$(cat version.txt)
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "Error: Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

      - name: Build extension
        run: npm run build

      - name: Test installation (Unix)
        if: runner.os != 'Windows'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libsecret-1-0
          fi
          npm install -g @google/gemini-cli
          mkdir -p ~/.gemini
          # Initialize registry with empty projects object to avoid TypeErrors
          echo '{"projects":{}}' > ~/.gemini/projects.json
          echo '{"config":{}}' > ~/.gemini/config.json
          gemini --version || true
          gemini extensions link . --consent || true
          gemini extensions list | grep "victoriametrics-logs-mcp"

      - name: Test installation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install -g @google/gemini-cli
          $geminiDir = [System.IO.Path]::Combine($env:USERPROFILE, ".gemini")
          if (!(Test-Path $geminiDir)) { New-Item -ItemType Directory -Path $geminiDir }
          '{"projects":{}}' | Out-File -FilePath (Join-Path $geminiDir "projects.json") -Encoding utf8
          '{"config":{}}' | Out-File -FilePath (Join-Path $geminiDir "config.json") -Encoding utf8
          try { gemini --version } catch {}
          try { gemini extensions link . --consent } catch {}
          $exts = gemini extensions list
          if ($exts -match "victoriametrics-logs-mcp") {
            echo "Extension found"
          } else {
            echo "Extension not found"
            exit 1
          }
            echo "Extension found"
          } else {
            echo "Extension not found"
            exit 1
          }

      - name: Package extension (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czvf ${{ matrix.platform }}.victoriametrics-logs-mcp.tar.gz \
            gemini-extension.json \
            package.json \
            README.md \
            GEMINI.md \
            dist/ \
            commands/ \
            skills/

      - name: Package extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path gemini-extension.json, package.json, README.md, GEMINI.md, dist, commands, skills -DestinationPath win32.victoriametrics-logs-mcp.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: |
            *.tar.gz
            *.zip

  create-release:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: get_version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
